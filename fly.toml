# fly.io configuration — SkyGlobe Group platform (same app as Render).
# Deploy: fly launch --copy-config --name skyglobegroup  (first time)
#         fly deploy                                     (updates)
# Secrets: fly secrets set SUPABASE_URL=... SUPABASE_KEY=... SESSION_SECRET=... \
#          ADMIN_PASSWORDS=... RESEND_API_KEY=... CANONICAL_HOST=skyglobegroup.com
app = "skyglobegroup"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
