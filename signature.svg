<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 190" width="480" height="190">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a2c52"/><stop offset="1" stop-color="#0b1838"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#ink)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bold capital S flourish (tall, confident opening) -->
    <path d="M150 40
             C 120 18, 70 26, 64 58
             C 60 82, 92 90, 96 70
             C 99 54, 78 52, 70 64
             M150 40
             C 156 70, 120 96, 78 110
