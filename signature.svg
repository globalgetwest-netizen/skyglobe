             C 140 96, 150 130, 176 120
             C 196 112, 188 86, 206 92
             C 224 98, 214 132, 238 124
             C 256 118, 250 96, 268 100"
          stroke-width="5"/>
    <!-- tall ascender loop (h/b) -->
    <path d="M268 100
             C 286 104, 300 40, 312 44
             C 322 47, 300 120, 296 124
             C 290 130, 312 108, 332 112
             C 352 116, 344 96, 360 100"
          stroke-width="5"/>
    <!-- tapering trailing scrawl -->
    <path d="M360 100
             C 384 106, 372 132, 396 122
             C 414 114, 410 98, 430 104
             C 446 109, 452 100, 466 96"
          stroke-width="4.5"/>
