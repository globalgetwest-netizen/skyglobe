<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13315f"/><stop offset="1" stop-color="#0a1f44"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8c766"/><stop offset="0.5" stop-color="#c9a84c"/><stop offset="1" stop-color="#9a7a25"/>
    </linearGradient>
    <path id="topArc" d="M 60 200 A 140 140 0 0 1 340 200" fill="none"/>
    <path id="botArc" d="M 64 200 A 136 136 0 0 0 336 200" fill="none"/>
  </defs>
  <g transform="rotate(-7 200 200)">
    <!-- rings -->
    <circle cx="200" cy="200" r="186" fill="none" stroke="url(#sg)" stroke-width="6"/>
    <circle cx="200" cy="200" r="150" fill="none" stroke="url(#sg)" stroke-width="3"/>
    <circle cx="200" cy="200" r="92"  fill="none" stroke="url(#sg)" stroke-width="2.5"/>
    <!-- circular text -->
    <text fill="#13315f" font-family="Georgia,serif" font-weight="700" font-size="30" letter-spacing="6">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">SKYGLOBE GROUP</textPath>
    </text>
    <text fill="#13315f" font-family="Georgia,serif" font-weight="600" font-size="19" letter-spacing="7">
      <textPath href="#botArc" startOffset="50%" text-anchor="middle">★ OFFICIAL · AUTHORISED ★</textPath>
    </text>
    <!-- side stars -->
    <text x="34" y="210" fill="#13315f" font-size="26" text-anchor="middle">★</text>
    <text x="366" y="210" fill="#13315f" font-size="26" text-anchor="middle">★</text>
    <!-- center: globe + S + plane (mini icon) -->
    <g transform="translate(200 200)">
      <circle cx="0" cy="0" r="58" fill="none" stroke="url(#gold)" stroke-width="3"/>
      <g stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.9">
        <line x1="-58" y1="0" x2="58" y2="0"/>
        <ellipse cx="0" cy="0" rx="22" ry="58"/>
        <path d="M-54 -22 Q0 -34 54 -22"/><path d="M-54 22 Q0 34 54 22"/>
      </g>
      <path d="M40 -38 C 22 -60, -36 -58, -52 -32 C -64 -10, -10 8, 28 16 C 60 24, 38 54, -10 50"
            fill="none" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
      <g transform="translate(40 -38) rotate(40)">
        <path d="M0 -16 L4 -4 L17 1 L4 4 L4 12 L0 9 L-4 12 L-4 4 L-17 1 L-4 -4 Z" fill="url(#gold)"/>
      </g>
    </g>
  </g>
</svg>
